# config.example.yaml — 复制为 config.yaml 后填写
# 敏感字段通过环境变量注入：BOT_TOKEN, DEEPSEEK_API_KEY
qq:
  app_id: "your-app-id"
  webhook_port: 8080

deepseek:
  api_key: ""                  # 从环境变量 DEEPSEEK_API_KEY 注入
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  default_system_prompt: "你是一个友好的QQ群助手"

trigger:
  mode: "hybrid"
  command_prefix: "/"

database:
  path: "./data/bot.db"
