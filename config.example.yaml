# config.example.yaml
# Discord Bot Token 通过环境变量 DISCORD_BOT_TOKEN 注入
discord:

deepseek:
  api_key: ""                      # env: DEEPSEEK_API_KEY
  base_url: "https://api.deepseek.com"
  model: "deepseek-v4-flash"
  default_system_prompt: "你是一个友好的助手"

trigger:
  mode: "mention"    # all | mention (仅@回复)

database:
  path: "./data/bot.db"

worker:
  count: 3            # Worker Pool 数量
  queue_size: 64      # 每个优先级队列缓冲大小
